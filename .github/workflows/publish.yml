name: Publish site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Fetch data
        run: python fetch_data.py

      - name: Execute notebooks (01 produces bayesian_input.json for 02)
        run: |
          ln -s ../data notebooks/data
          jupyter nbconvert --to notebook --execute --inplace --ExecutePreprocessor.timeout=480 notebooks/01_shadow_eda.ipynb
          jupyter nbconvert --to notebook --execute --inplace --ExecutePreprocessor.timeout=480 notebooks/02_bayesian_hierarchical.ipynb

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: quarto render

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
